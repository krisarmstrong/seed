# =============================================================================
# CodeQL configuration for seed
# =============================================================================
# Extends the default Go + JS/TS analysis with two scoped exclusions for
# false positives that have no real-fix at the code level.
# =============================================================================

name: "Seed CodeQL config"

queries:
  - uses: security-extended
  - uses: security-and-quality

# Query filters apply to all paths. Use these only for rules where the
# false positive cannot be eliminated by restructuring the code.
query-filters:
  # internal/auth/hibp.go uses SHA-1 because the HIBP k-anonymity API
  # protocol (https://haveibeenpwned.com/API/v3#PwnedPasswords) mandates
  # it. The plaintext password is hashed locally, only the first 5 hex
  # chars of the SHA-1 are sent to the API, and the response is matched
  # against the remaining 35 chars in process. SHA-1 is NOT used for
  # password storage — that's Argon2id elsewhere in this package. CodeQL's
  # `go/weak-sensitive-data-hashing` cannot distinguish a one-shot
  # public-API protocol hash from a stored credential hash, so we exclude
  # the rule for this specific file.
  - exclude:
      id: go/weak-sensitive-data-hashing
