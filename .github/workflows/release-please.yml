# =============================================================================
# Release Please - Automated Version Management
# =============================================================================
# Creates release PRs with changelogs when commits land on main.
# When a release PR is merged, creates a GitHub release which triggers
# release.yml for building packages (via version tag).
#
# NOTE: This workflow only manages versions and changelogs.
# Artifact building happens in release.yml (triggered by version tags).
# =============================================================================

name: Release Please

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Only run if CI workflow succeeded (or this is a manual dispatch).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          # PAT (not GITHUB_TOKEN) so the release PR's CI runs and the
          # tag-push event triggers release.yml. With GITHUB_TOKEN those
          # downstream workflows are silently skipped per GitHub's
          # anti-recursion policy. Falls back to GITHUB_TOKEN if the
          # secret isn't set, so the workflow doesn't break if the PAT
          # expires before being renewed (cascade is lost until renewed).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          release-type: go

      - name: Release created
        if: ${{ steps.release.outputs.release_created }}
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          echo "Release ${TAG_NAME} created!"
          echo "Version: ${VERSION}"
          echo "The release.yml workflow will build packages when the tag is pushed."
