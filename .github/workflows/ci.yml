name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Go backend checks
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Install libpcap-dev
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Use a recent golangci-lint; older versions don't support --out-format used by the action
          version: latest
          args: --timeout=5m
          install-mode: goinstall

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files are not formatted. Please run 'gofmt -w .'"
            exit 1
          fi

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: backend
          fail_ci_if_error: false

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  # Frontend checks
  frontend:
    name: Frontend (React/TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npm run lint --if-present

      - name: Run Prettier
        run: npx prettier --check .

      - name: Build
        run: npm run build

  # Security checks
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Install libpcap (cgo dependency)
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: "-no-fail -fmt sarif -out gosec-results.sarif ./..."

      - name: Upload gosec results
        if: ${{ always() && (github.repository_visibility == 'public' || env.ENABLE_CODEQL == 'true') }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec-results.sarif

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Run npm audit
        working-directory: web
        run: |
          npm ci
          npm audit --audit-level=high || echo "::warning::npm audit found vulnerabilities"

  # Code quality checks
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for AI tool references
        run: |
          # Fail if AI tool references are found in source code
          PATTERN='(claude|chatgpt|gpt-4|gemini|anthropic|openai|copilot|ai.generated|generated.with)'

          # Search in source files only
          if grep -riE "$PATTERN" \
            --include="*.go" \
            --include="*.ts" \
            --include="*.tsx" \
            --include="*.js" \
            --include="*.jsx" \
            --include="*.css" \
            --include="*.html" \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=dist \
            . 2>/dev/null; then
            echo "ERROR: AI tool references found in source code"
            echo "Please remove references to AI tools from source files"
            exit 1
          fi
          echo "No AI tool references found in source code"

      - name: Check for sensitive files
        run: |
          # Fail if sensitive files are being committed
          SENSITIVE=".env credentials.json secrets.yaml *.pem *.key"
          for file in $SENSITIVE; do
            if find . -name "$file" -not -path "./node_modules/*" -not -path "./.git/*" | grep -q .; then
              echo "ERROR: Sensitive file pattern '$file' found"
              exit 1
            fi
          done
          echo "No sensitive files detected"

  # Build verification
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install libpcap (cgo dependency)
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Build Go binary
        run: go build -o netscope ./cmd/netscope

      - name: Verify binary
        run: |
          ./netscope --version 2>/dev/null || echo "Binary built successfully"
          ls -la netscope
