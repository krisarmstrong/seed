# =============================================================================
# CI Pipeline - The Seed
# =============================================================================
# Main CI pipeline running on every push/PR to main.
#
# Features:
# - Pinned action versions (@v6) for reproducibility
# - Go version from go.mod, Node.js 25.2.1
# - Full staticcheck analysis (dead-code.yml handles weekly U* reports)
# - Deterministic builds with -trimpath -buildvcs=false
# - Build verification for amd64 and arm64 release targets
# - Frontend build artifact sharing between jobs
#
# Related workflows:
# - license-check.yml: License compliance (not duplicated here)
# - dead-code.yml: Weekly unused code reports
# - codeql.yml: Security analysis
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  # ===========================================================================
  # Go Backend Checks
  # ===========================================================================
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    env:
      GOMODCACHE: ${{ github.workspace }}/.cache/go/pkg/mod
      GOCACHE: ${{ github.workspace }}/.cache/go/build

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Install libpcap-dev
        uses: ./.github/actions/setup-libpcap

      - name: Set up Node.js
        uses: ./.github/actions/setup-node

      - name: Build embedded UI assets
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.1

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m --new-from-rev=HEAD~1

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Check formatting
        run: test -z "$(git ls-files '*.go' | xargs gofmt -l)"

      - name: Run tests
        env:
          SKIP_IPERF_TEST: "1"
        run: go test -v -coverprofile=coverage.out ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | sed 's/%//')
          echo "Current coverage: ${COVERAGE}%"

          # Minimum coverage threshold (will be increased incrementally to 90%)
          MIN_COVERAGE=40

          if (( $(echo "$COVERAGE < $MIN_COVERAGE" | bc -l) )); then
            echo "ERROR: Coverage ${COVERAGE}% is below minimum threshold of ${MIN_COVERAGE}%"
            exit 1
          fi

          echo "✅ Coverage check passed (${COVERAGE}% >= ${MIN_COVERAGE}%)"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          flags: backend
          fail_ci_if_error: false

      - name: Deterministic build check
        run: go build -trimpath -buildvcs=false ./...

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  # ===========================================================================
  # Go Race Detector
  # ===========================================================================
  # Race detection moved here from the pre-commit hook (#945). Hook ran fast
  # short tests; this job runs the full suite under -race on every push/PR.
  # Blocking — the cmd/seed t.Parallel() races discovered when this job was
  # introduced were fixed in the same PR (#947) by dropping parallelism from
  # cmd/seed tests, since subtests shared a single cobra.Command parent and
  # raced on its sortedFlags cache.
  race:
    name: Backend (race detector)
    runs-on: ubuntu-latest
    env:
      GOMODCACHE: ${{ github.workspace }}/.cache/go/pkg/mod
      GOCACHE: ${{ github.workspace }}/.cache/go/build

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Install libpcap-dev
        uses: ./.github/actions/setup-libpcap

      - name: Set up Node.js
        uses: ./.github/actions/setup-node

      - name: Build embedded UI assets
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Run tests with race detector
        env:
          SKIP_IPERF_TEST: "1"
        run: go test -short -race ./...

  # ===========================================================================
  # Frontend Checks
  # ===========================================================================
  frontend:
    name: Frontend (React/TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: npm ci

      - name: Verify package-lock integrity
        run: git diff --exit-code package-lock.json

      - name: Run TypeScript check
        continue-on-error: true
        run: npx tsc --noEmit

      - name: Run Biome (lint + format)
        run: npm run lint

      - name: Run unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v7.0.1
        with:
          name: frontend-dist
          path: ui/dist/
          retention-days: 1

  # ===========================================================================
  # Security Scanning
  # ===========================================================================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Install libpcap-dev
        uses: ./.github/actions/setup-libpcap

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run gosec
        uses: securego/gosec@v2.22.11
        continue-on-error: true
        with:
          args: "-fmt sarif -out gosec-results.sarif ./..."

      - name: Upload gosec results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('gosec-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: gosec-results.sarif

      - name: Set up Node.js
        uses: ./.github/actions/setup-node

      - name: Run npm audit
        working-directory: ui
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      # License compliance is handled by the dedicated license-check.yml workflow
      # to avoid duplication. See .github/workflows/license-check.yml

  # ===========================================================================
  # Code Quality Checks
  # ===========================================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Check for AI tool references
        run: |
          PATTERN='(claude|chatgpt|gpt-4|gemini|anthropic|openai|copilot|ai.generated|generated.with)'
          if grep -riE "$PATTERN" \
            --include="*.go" \
            --include="*.ts" \
            --include="*.tsx" \
            --include="*.js" \
            --include="*.jsx" \
            --include="*.css" \
            --include="*.html" \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=dist \
            . 2>/dev/null; then
            echo "::warning::AI/assistant references found; review for accidental disclosure"
          fi

      - name: Check for sensitive files
        run: |
          SENSITIVE=".env credentials.json secrets.yaml *.pem *.key"
          for file in $SENSITIVE; do
            if find . -name "$file" -not -path "./node_modules/*" -not -path "./.git/*" | grep -q .; then
              echo "ERROR: Sensitive file pattern '$file' found"
              exit 1
            fi
          done
          echo "No sensitive files detected"

      - name: Check for unsafe logging patterns
        run: |
          echo "Checking for dangerous logging patterns..."

          # Patterns that may log sensitive data (excluding test files and logging package itself)
          DANGEROUS_PATTERNS=(
            'log\.Print.*r\.Body'
            'log\.Print.*bodyBytes'
            'log\.Print.*req\.Password'
            'log\.Print.*\.password'
            'log\.Print.*\.token'
            'log\.Print.*Authorization'
            'log\.Print.*X-Api-Key'
            'io\.ReadAll.*r\.Body.*log'
            'fmt\.Printf.*r\.Body'
            'fmt\.Printf.*password'
          )

          VIOLATIONS=0
          for pattern in "${DANGEROUS_PATTERNS[@]}"; do
            # Search Go files, excluding tests and the logging package
            if grep -rn -E "$pattern" \
              --include="*.go" \
              --exclude="*_test.go" \
              --exclude-dir=internal/logging \
              --exclude-dir=.git \
              --exclude-dir=node_modules \
              internal/ cmd/ 2>/dev/null; then
              echo "❌ Found dangerous logging pattern: $pattern"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done

          if [ $VIOLATIONS -gt 0 ]; then
            echo ""
            echo "ERROR: Found $VIOLATIONS unsafe logging pattern(s)"
            echo "Use internal/logging.Redact* functions to safely log data"
            echo "See internal/logging/redact.go for examples"
            exit 1
          fi

          echo "✅ No unsafe logging patterns detected"

  # ===========================================================================
  # C Code Linting (if applicable)
  # ===========================================================================
  # ===========================================================================
  # C Lint (C23 Standard - NOT C++)
  # ===========================================================================
  c-lint:
    name: C Lint (C23)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install C23 tools (clang-tidy, cppcheck, bear)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-18 \
            clang-tidy-18 \
            clang-format-18 \
            cppcheck \
            bear \
            gcc-13
          
          # Set clang-18 as default
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-18 100
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-18 100
          
          # Verify versions
          clang --version
          clang-tidy --version
          gcc-13 --version

      - name: Check if C files exist
        id: check-c
        run: |
          if find . -name '*.c' -o -name '*.h' 2>/dev/null | grep -v node_modules | grep -q .; then
            echo "has_c=true" >> $GITHUB_OUTPUT
            echo "Found C source files"
          else
            echo "has_c=false" >> $GITHUB_OUTPUT
            echo "No C source files found - C23 linting ready for when C code is added"
          fi

      - name: Generate compile_commands.json
        if: steps.check-c.outputs.has_c == 'true'
        run: |
          # Create basic compile_commands.json for clang-tidy
          cat > compile_commands.json << 'EOF'
          [
            {
              "directory": "${{ github.workspace }}",
              "command": "gcc-13 -std=c23 -Wall -Wextra -Wpedantic -Iinclude -c placeholder.c",
              "file": "placeholder.c"
            }
          ]
          EOF
          
          # Use bear to generate proper compile_commands.json if Makefile exists
          if [ -f "Makefile" ]; then
            export CC=gcc-13
            bear -- make || true
          fi

      - name: Run clang-format check (C23)
        if: steps.check-c.outputs.has_c == 'true'
        run: |
          echo "Checking C code formatting (C23 standard)..."
          find . -name '*.c' -o -name '*.h' 2>/dev/null | grep -v node_modules | \
            xargs clang-format --dry-run --Werror --style=file

      - name: Run clang-tidy (C23)
        if: steps.check-c.outputs.has_c == 'true'
        run: |
          echo "Running clang-tidy with C23 checks..."
          find . -name '*.c' -o -name '*.h' 2>/dev/null | grep -v node_modules | \
            xargs clang-tidy \
              --config-file=.clang-tidy \
              --extra-arg=-std=c23 \
              --extra-arg=-Iinclude \
              --warnings-as-errors='*'

      - name: Run cppcheck (C only, not C++)
        if: steps.check-c.outputs.has_c == 'true'
        run: |
          echo "Running cppcheck for C code..."
          cppcheck \
            --std=c23 \
            --language=c \
            --enable=warning,style,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --inline-suppr \
            --error-exitcode=1 \
            --template='{file}:{line}: {severity}: {message} [{id}]' \
            -I include \
            . 2>&1 | tee cppcheck.log
          
          if [ -s cppcheck.log ]; then
            echo "::warning::cppcheck found issues"
          fi

  # ===========================================================================
  # Internationalization (i18n) Checks
  # ===========================================================================
  i18n:
    name: i18n Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Check translation key coverage
        run: |
          echo "Checking translation key coverage..."

          # Compare English and Spanish locale keys
          for file in locales/en/*.json; do
            name=$(basename "$file")
            es_file="locales/es/$name"

            if [ ! -f "$es_file" ]; then
              echo "❌ Missing Spanish locale file: $name"
              exit 1
            fi

            # Extract keys from both files and compare
            en_keys=$(jq -r 'paths(scalars) | join(".")' "$file" | sort)
            es_keys=$(jq -r 'paths(scalars) | join(".")' "$es_file" | sort)

            missing=$(comm -23 <(echo "$en_keys") <(echo "$es_keys"))
            if [ -n "$missing" ]; then
              echo "❌ Missing keys in es/$name:"
              echo "$missing"
              exit 1
            fi
          done

          echo "✅ All translation keys present in all locales"

  # ===========================================================================
  # Documentation Checks
  # ===========================================================================
  docs:
    name: Documentation Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: npm ci

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        continue-on-error: true
        with:
          use-quiet-mode: "yes"
          config-file: ".github/markdown-link-check.json"

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v19
        continue-on-error: true
        with:
          globs: |
            **/*.md
            !**/node_modules/**
            !**/dist/**

      - name: Validate wiki navigation
        run: |
          echo "Checking wiki navigation links..."
          WIKI_DIR="docs/wiki"

          # Extract all wiki links from Home.md
          HOME_LINKS=$(grep -oP '\]\(\K[^)]+' "$WIKI_DIR/Home.md" | grep -v '^http' | grep -v '^#' || true)

          # Check each link exists as a .md file
          for link in $HOME_LINKS; do
            # Convert link to filename (e.g., "Intel-WiFi" -> "Intel-WiFi.md")
            if [[ ! "$link" =~ \.md$ ]]; then
              link="$link.md"
            fi

            if [[ ! -f "$WIKI_DIR/$link" ]]; then
              echo "ERROR: Broken wiki link: $link (referenced in Home.md but file not found)"
              exit 1
            fi
          done

          echo "All wiki navigation links are valid"

      - name: Check template references
        run: |
          echo "Verifying test report templates..."

          # Templates should exist
          TEMPLATES=(
            "docs/templates/WIFI_TEST_REPORT.md"
            "docs/templates/ETHERNET_TEST_REPORT.md"
          )

          for template in "${TEMPLATES[@]}"; do
            if [[ ! -f "$template" ]]; then
              echo "ERROR: Missing template: $template"
              exit 1
            fi
          done

          # Templates should be referenced in CONTRIBUTING.md
          if ! grep -q "WIFI_TEST_REPORT\|ETHERNET_TEST_REPORT" CONTRIBUTING.md; then
            echo "WARNING: Templates not referenced in CONTRIBUTING.md"
          fi

          echo "All test report templates are valid"

  # ===========================================================================
  # Build Verification
  # ===========================================================================
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Download frontend build
        uses: actions/download-artifact@v8.0.1
        with:
          name: frontend-dist
          path: ui/dist/

      - name: Install libpcap-dev
        uses: ./.github/actions/setup-libpcap

      - name: Build Go binary (amd64)
        env:
          CGO_ENABLED: 1
        run: |
          go build -trimpath -buildvcs=false \
            -ldflags="-s -w" \
            -o seed-linux-amd64 ./cmd/seed

      - name: Install arm64 cross-build dependencies
        run: |
          sudo dpkg --add-architecture arm64
          sudo rm -f /etc/apt/sources.list.d/ubuntu.sources
          sudo tee /etc/apt/sources.list.d/ubuntu-amd64.list >/dev/null <<'EOF'
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble main universe multiverse restricted
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble-updates main universe multiverse restricted
          deb [arch=amd64] http://azure.archive.ubuntu.com/ubuntu noble-backports main universe multiverse restricted
          deb [arch=amd64] http://security.ubuntu.com/ubuntu noble-security main universe multiverse restricted
          EOF
          for f in /etc/apt/sources.list.d/*.list /etc/apt/sources.list; do
            [ -f "$f" ] || continue
            case "$f" in
              */ubuntu-amd64.list|*/ports-arm64.list) continue ;;
            esac
            sudo sed -i '/^deb \[/!s|^deb |deb [arch=amd64] |' "$f"
          done
          sudo tee /etc/apt/sources.list.d/ports-arm64.list >/dev/null <<'EOF'
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main universe multiverse restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe multiverse restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main universe multiverse restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-backports main universe multiverse restricted
          EOF

          sudo apt-get update || true
          sudo apt-get install -y gcc-aarch64-linux-gnu linux-libc-dev:arm64 libpcap-dev:arm64 libpcap0.8-dev:arm64 pkg-config

      - name: Build Go binary (arm64)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 1
          CC: aarch64-linux-gnu-gcc
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
        run: |
          go build -trimpath -buildvcs=false \
            -ldflags="-s -w" \
            -o seed-linux-arm64 ./cmd/seed

      - name: Verify binaries
        run: |
          echo "=== AMD64 Binary ==="
          file seed-linux-amd64
          ls -la seed-linux-amd64
          echo ""
          echo "=== ARM64 Binary ==="
          file seed-linux-arm64
          ls -la seed-linux-arm64

  # ===========================================================================
  # E2E Browser Tests (Playwright)
  # ===========================================================================
  e2e:
    name: E2E Browser Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Set up Node.js
        uses: ./.github/actions/setup-node

      - name: Install libpcap-dev
        uses: ./.github/actions/setup-libpcap

      - name: Download frontend build
        uses: actions/download-artifact@v8.0.1
        with:
          name: frontend-dist
          path: ui/dist/

      - name: Install frontend dependencies (for Playwright)
        working-directory: ui
        run: npm ci

      - name: Build backend
        run: |
          go build -trimpath -buildvcs=false \
            -ldflags="-s -w" \
            -o seed ./cmd/seed

      - name: Install Playwright browsers
        working-directory: ui
        run: npx playwright install --with-deps chromium

      - name: Start backend server
        env:
          SEED_CONFIG_PATH: ${{ runner.temp }}/seed/config.yaml
        run: |
          mkdir -p data
          sudo setcap cap_net_raw=+ep ./seed || true
          nohup ./seed --config "$SEED_CONFIG_PATH" > server.log 2>&1 &
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -sk https://localhost:8443/ >/dev/null 2>&1; then
              echo "Server ready after $i attempts"
              exit 0
            fi
            echo "Attempt $i: Server not ready, waiting..."
            sleep $((i < 5 ? 1 : 2))
          done
          echo "Server failed to start after 30 attempts"
          cat server.log
          exit 1

      - name: Run Playwright E2E tests
        working-directory: ui
        env:
          E2E_BASE_URL: https://localhost:8443
        run: npx playwright test e2e/smoke.spec.ts e2e/setup-wizard.spec.ts --project=chromium --reporter=html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 7

      - name: Upload server logs on failure
        uses: actions/upload-artifact@v7.0.1
        if: failure()
        with:
          name: server-logs
          path: server.log

  # ===========================================================================
  # Lighthouse CI - Performance & Accessibility Audits
  # ===========================================================================
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: ./.github/actions/setup-go

      - name: Install libpcap-dev
        uses: ./.github/actions/setup-libpcap

      - name: Download frontend build
        uses: actions/download-artifact@v8.0.1
        with:
          name: frontend-dist
          path: ui/dist/

      - name: Build backend
        run: |
          go build -trimpath -buildvcs=false \
            -ldflags="-s -w" \
            -o seed ./cmd/seed

      - name: Start backend server
        env:
          SEED_CONFIG_PATH: ${{ runner.temp }}/seed/config.yaml
        run: |
          mkdir -p data
          sudo setcap cap_net_raw=+ep ./seed || true
          nohup ./seed --config "$SEED_CONFIG_PATH" > server.log 2>&1 &
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -sk https://localhost:8443/ >/dev/null 2>&1; then
              echo "Server ready after $i attempts"
              exit 0
            fi
            echo "Attempt $i: Server not ready, waiting..."
            sleep $((i < 5 ? 1 : 2))
          done
          echo "Server failed to start after 30 attempts"
          cat server.log
          exit 1

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://localhost:8443
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Upload server logs on failure
        uses: actions/upload-artifact@v7.0.1
        if: failure()
        with:
          name: lighthouse-server-logs
          path: server.log
