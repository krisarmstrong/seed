# =============================================================================
# CI Pipeline - LuminetIQ
# =============================================================================
# A+++++++ quality CI with:
# - Pinned action versions for reproducibility
# - Go 1.25.5 via toolchain enforcement
# - Node.js 25.2.1 pinned
# - staticcheck for advanced Go analysis
# - Deterministic builds with -trimpath -buildvcs=false
# - Multi-arch verification (amd64 + arm64)
# - Package-lock integrity check
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  # ===========================================================================
  # Go Backend Checks
  # ===========================================================================
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    env:
      GOMODCACHE: ${{ runner.temp }}/go/pkg/mod
      GOCACHE: ${{ runner.temp }}/go/build

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libpcap-dev
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Download Go modules
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.7.2
          args: --timeout=5m

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          flags: backend
          fail_ci_if_error: false

      - name: Deterministic build check
        run: go build -trimpath -buildvcs=false ./...

      - name: Cross-compile verification
        run: |
          GOOS=linux GOARCH=amd64 go build ./...
          GOOS=linux GOARCH=arm64 go build ./...

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  # ===========================================================================
  # Frontend Checks
  # ===========================================================================
  frontend:
    name: Frontend (React/TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.2.1"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify package-lock integrity
        run: git diff --exit-code package-lock.json

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npm run lint --if-present

      - name: Run Prettier
        run: npx prettier --check .

      - name: Build
        run: npm run build

  # ===========================================================================
  # Security Scanning
  # ===========================================================================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libpcap-dev
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run gosec
        uses: securego/gosec@v2.22.1
        with:
          args: "-no-fail -fmt sarif -out gosec-results.sarif ./..."

      - name: Upload gosec results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec-results.sarif

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.2.1"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Run npm audit
        working-directory: web
        run: |
          npm ci
          npm audit --audit-level=high

  # ===========================================================================
  # Code Quality Checks
  # ===========================================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for AI tool references
        run: |
          PATTERN='(claude|chatgpt|gpt-4|gemini|anthropic|openai|copilot|ai.generated|generated.with)'
          if grep -riE "$PATTERN" \
            --include="*.go" \
            --include="*.ts" \
            --include="*.tsx" \
            --include="*.js" \
            --include="*.jsx" \
            --include="*.css" \
            --include="*.html" \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=dist \
            . 2>/dev/null; then
            echo "ERROR: AI tool references found in source code"
            exit 1
          fi
          echo "No AI tool references found"

      - name: Check for sensitive files
        run: |
          SENSITIVE=".env credentials.json secrets.yaml *.pem *.key"
          for file in $SENSITIVE; do
            if find . -name "$file" -not -path "./node_modules/*" -not -path "./.git/*" | grep -q .; then
              echo "ERROR: Sensitive file pattern '$file' found"
              exit 1
            fi
          done
          echo "No sensitive files detected"

  # ===========================================================================
  # Build Verification
  # ===========================================================================
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.2.1"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install libpcap-dev
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Build Go binary (amd64)
        run: |
          go build -trimpath -buildvcs=false \
            -ldflags="-s -w" \
            -o luminetiq-linux-amd64 ./cmd/luminetiq

      - name: Build Go binary (arm64)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -trimpath -buildvcs=false \
            -ldflags="-s -w" \
            -o luminetiq-linux-arm64 ./cmd/luminetiq

      - name: Verify binaries
        run: |
          echo "=== AMD64 Binary ==="
          file luminetiq-linux-amd64
          ls -la luminetiq-linux-amd64
          echo ""
          echo "=== ARM64 Binary ==="
          file luminetiq-linux-arm64
          ls -la luminetiq-linux-arm64
