# =============================================================================
# Release (goreleaser)
# =============================================================================
# Canonical release pipeline. Drives .goreleaser.yml inside the
# goreleaser-cross container.
#
# Triggers:
#   - push to a v* tag: real release — builds, signs, publishes, generates
#     SLSA L3 provenance
#   - workflow_dispatch with dry_run=true: snapshot only — no publish, no
#     signing, no provenance; artifacts uploaded for inspection
#
# Toolchain notes:
#   The goreleaser-cross Docker image ships:
#     - gcc + gcc-aarch64-linux-gnu (Linux cross)
#     - mingw-w64 (Windows cross; we use CGO_ENABLED=0 there anyway)
#     - osxcross + macOS SDK (Darwin cross)
#   Node + iperf3 are produced in separate jobs and downloaded into the
#   goreleaser workspace; the cross image is Go-focused.
#   libpcap-dev:arm64 is apt-installed at the start because the cross
#   image doesn't ship libpcap headers per target arch.
#
# Known limitation:
#   macOS .pkg installer is not produced (no native pkgbuild from Linux).
#   macOS users get the .tar.gz; deploy/macos/build-pkg.sh stays in-tree
#   for anyone who wants to assemble one locally.
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Snapshot build only — do not publish or sign"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write # cosign keyless OIDC
  packages: write

jobs:
  # =========================================================================
  # iperf3 binaries — same matrix as release.yml's build-iperf3 job.
  # Built on native runners; goreleaser picks them up from bin/.
  # =========================================================================
  build-iperf3:
    name: Build iperf3 (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool

      - name: Get latest iperf3 version
        id: iperf3_version
        run: |
          LATEST=$(curl -s https://api.github.com/repos/esnet/iperf/releases/latest | jq -r '.tag_name')
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Download and build iperf3
        run: |
          VERSION="${{ steps.iperf3_version.outputs.version }}"
          curl -L -o iperf3.tar.gz "https://github.com/esnet/iperf/archive/refs/tags/${VERSION}.tar.gz"
          tar -xzf iperf3.tar.gz
          cd iperf-*
          if [ ! -f configure ]; then ./bootstrap.sh || autoreconf -i; fi
          ./configure --prefix=/tmp/iperf3-install --disable-shared --enable-static-bin
          make -j$(nproc)
          make install
          mkdir -p ../dist
          cp /tmp/iperf3-install/bin/iperf3 ../dist/iperf3-linux-${{ matrix.arch }}
          chmod +x ../dist/iperf3-linux-${{ matrix.arch }}

      - name: Upload iperf3 artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: iperf3-linux-${{ matrix.arch }}
          path: dist/iperf3-linux-${{ matrix.arch }}
          retention-days: 1

  # =========================================================================
  # UI build — done outside the goreleaser-cross container because that
  # image is Go-focused and doesn't ship Node. Vite writes directly into
  # internal/api/ui/; the next job inherits the workspace.
  # =========================================================================
  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    outputs:
      ui_hash: ${{ steps.ui-hash.outputs.hash }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "25.2.1"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: |
          cd ui
          npm ci
          npm run build

      - name: Compute UI build hash
        id: ui-hash
        run: |
          UI_BUILD_HASH=$(find internal/api/ui -type f -exec md5sum {} \; | sort | md5sum | cut -d' ' -f1)
          echo "hash=$UI_BUILD_HASH" >> "$GITHUB_OUTPUT"

      - name: Upload UI dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ui-dist
          path: internal/api/ui/
          retention-days: 1
          include-hidden-files: true

  # =========================================================================
  # goreleaser build + publish — runs inside goreleaser-cross container
  # so all cross-compile toolchains are present.
  # =========================================================================
  goreleaser:
    name: goreleaser ${{ inputs.dry_run && '(snapshot)' || '(release)' }}
    runs-on: ubuntu-latest
    needs: [build-iperf3, build-ui]
    container:
      # Docker Hub tag scheme: <go-version>-<bundle-revision>. v1.26.2-3
      # tracks Go 1.26.2 + goreleaser v2.15.4. Pin so behaviour stays
      # reproducible; bump via dependabot when newer revs land.
      image: goreleaser/goreleaser-cross:v1.26.2-3
    outputs:
      # base64-encoded SHA-256 hashes of all release artifacts, formatted
      # for slsa-github-generator's base64-subjects input. Set only on a
      # real (non-snapshot) release.
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Mark workspace as safe (container runs as root)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install libpcap headers for amd64 + arm64
        # goreleaser-cross ships compilers but not libpcap headers.
        # gopacket/pcap needs pcap.h for cgo. Add the arm64 architecture
        # and pull libpcap-dev for both archs.
        shell: bash
        run: |
          set -euo pipefail
          dpkg --add-architecture arm64
          if [ -f /etc/apt/sources.list ]; then
            sed -i 's|^deb |deb [arch=amd64] |' /etc/apt/sources.list
          fi
          shopt -s nullglob
          for f in /etc/apt/sources.list.d/*.list; do
            sed -i 's|^deb |deb [arch=amd64] |' "$f"
          done
          cat > /etc/apt/sources.list.d/arm64.list <<'EOF'
          deb [arch=arm64] http://deb.debian.org/debian bookworm main
          deb [arch=arm64] http://deb.debian.org/debian-security bookworm-security main
          deb [arch=arm64] http://deb.debian.org/debian bookworm-updates main
          EOF
          apt-get update || true
          apt-get install -y libpcap-dev libpcap-dev:arm64

      - name: Download iperf3 artifacts (amd64 + arm64)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: iperf3-linux-*
          path: bin/
          merge-multiple: true

      - name: Restore iperf3 executable bits
        run: chmod +x bin/iperf3-linux-*

      - name: Download UI dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ui-dist
          path: internal/api/ui/

      - name: Install Syft (SBOM) inside container
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Install Cosign inside container
        run: |
          COSIGN_VERSION=v2.4.1
          curl -sSfL -o /usr/local/bin/cosign "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
          chmod +x /usr/local/bin/cosign

      - name: Run goreleaser (snapshot/dry-run)
        if: inputs.dry_run
        env:
          UI_BUILD_HASH: ${{ needs.build-ui.outputs.ui_hash }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: goreleaser release --snapshot --clean --skip=publish,announce

      - name: Run goreleaser (publish)
        if: ${{ !inputs.dry_run }}
        env:
          UI_BUILD_HASH: ${{ needs.build-ui.outputs.ui_hash }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional. When present, goreleaser publishes the Homebrew
          # formula to krisarmstrong/homebrew-tap. When absent, the brew
          # step is skipped (config sets skip_upload: auto). PAT scope:
          # fine-grained with contents:write on this repo and the tap.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
        run: goreleaser release --clean

      - name: Capture artifact hashes for SLSA provenance
        if: ${{ !inputs.dry_run }}
        id: hashes
        shell: bash
        run: |
          # goreleaser drops artifacts.json describing every produced
          # artifact. Filter to the user-facing ones (archive/package
          # types) and base64-encode their SHA-256 list for the
          # slsa-github-generator reusable workflow.
          set -euo pipefail
          hashes=$(jq -r '
            map(select(.type == "Archive" or .type == "Linux Package")) |
            map("\(.extra.Checksum | sub("^sha256:"; ""))  \(.name)") |
            join("\n")
          ' dist/artifacts.json | base64 -w0)
          echo "hashes=${hashes}" >> "$GITHUB_OUTPUT"

      - name: Upload dry-run artifact bundle for inspection
        if: inputs.dry_run
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: goreleaser-dryrun-${{ github.run_id }}
          path: dist/
          retention-days: 14

  # =========================================================================
  # SLSA Level 3 provenance — runs only on real releases (not dry-run).
  # The slsa-github-generator reusable workflow builds an in-toto
  # attestation signed via Sigstore keyless OIDC and uploads it alongside
  # the release artifacts.
  # =========================================================================
  provenance:
    name: SLSA provenance
    if: ${{ !inputs.dry_run }}
    needs: [goreleaser]
    permissions:
      id-token: write   # for Sigstore OIDC
      contents: write   # for uploading attestation to the release
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: ${{ needs.goreleaser.outputs.hashes }}
      upload-assets: true
      provenance-name: seed-slsa-provenance.intoto.jsonl
