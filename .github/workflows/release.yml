# =============================================================================
# Release - The Seed
# =============================================================================
# Manual release workflow for creating versioned releases.
# Builds multi-arch packages (.tar.gz, .deb, .rpm) with bundled iperf3.
# Triggered on version tags (v*) or manual dispatch.
#
# NOTE: Full CI validation happens in ci.yml on every push to main.
# Tags should only be created after CI passes on main.
# This workflow focuses on building release artifacts.
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ===========================================================================
  # Build iperf3
  # ===========================================================================
  build-iperf3:
    name: Build iperf3
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: amd64
            cc: gcc
          - arch: arm64
            cc: aarch64-linux-gnu-gcc

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU for cross-arch testing
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu qemu-user-static
          fi

      - name: Get latest iperf3 version
        id: iperf3_version
        run: |
          LATEST=$(curl -s https://api.github.com/repos/esnet/iperf/releases/latest | jq -r '.tag_name')
          echo "version=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest iperf3 version: $LATEST"

      - name: Download and build iperf3
        env:
          CC: ${{ matrix.cc }}
        run: |
          VERSION="${{ steps.iperf3_version.outputs.version }}"
          curl -L -o iperf3.tar.gz "https://github.com/esnet/iperf/archive/refs/tags/${VERSION}.tar.gz"
          tar -xzf iperf3.tar.gz
          cd iperf-*

          if [ ! -f configure ]; then
            ./bootstrap.sh || autoreconf -i
          fi

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            ./configure --host=aarch64-linux-gnu --prefix=/tmp/iperf3-install --disable-shared --enable-static-bin
          else
            ./configure --prefix=/tmp/iperf3-install --disable-shared --enable-static-bin
          fi

          make -j$(nproc)
          make install

          mkdir -p ../dist
          cp /tmp/iperf3-install/bin/iperf3 ../dist/iperf3-linux-${{ matrix.arch }}
          chmod +x ../dist/iperf3-linux-${{ matrix.arch }}

      - name: Verify iperf3 binary (smoke test)
        run: |
          echo "=== Binary file type ==="
          file dist/iperf3-linux-${{ matrix.arch }}

          echo ""
          echo "=== Version smoke test ==="
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            qemu-aarch64-static dist/iperf3-linux-${{ matrix.arch }} --version
          else
            ./dist/iperf3-linux-${{ matrix.arch }} --version
          fi
          echo "✅ iperf3 smoke test passed"

      - name: Upload iperf3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: iperf3-linux-${{ matrix.arch }}
          path: dist/iperf3-linux-${{ matrix.arch }}

  # ===========================================================================
  # Build Release Packages
  # ===========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-iperf3
    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        include:
          - arch: amd64
            cc: gcc
          - arch: arm64
            cc: aarch64-linux-gnu-gcc

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.2.1"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Set up QEMU for cross-arch testing
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install build dependencies
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo dpkg --add-architecture arm64
            sudo tee /etc/apt/sources.list.d/ports-arm64.list >/dev/null <<'EOF'
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main universe multiverse restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe multiverse restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main universe multiverse restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-backports main universe multiverse restricted
          EOF
          fi

          sudo apt-get update
          sudo apt-get install -y rpm
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu libpcap-dev:arm64 libpcap0.8-dev:arm64 pkg-config qemu-user-static
          else
            sudo apt-get install -y libpcap-dev pkg-config
          fi

      - name: Download iperf3 binary
        uses: actions/download-artifact@v6
        with:
          name: iperf3-linux-${{ matrix.arch }}
          path: bin/

      - name: Build frontend
        run: |
          cd ui
          npm ci
          npm run build

      - name: Build The Seed
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
          else
            export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig
          fi
          go build -trimpath -buildvcs=false \
            -ldflags="-s -w -X github.com/krisarmstrong/seed/internal/version.Version=${{ github.ref_name }}" \
            -o dist/seed-linux-${{ matrix.arch }} ./cmd/seed

      - name: Verify binaries (smoke test)
        run: |
          echo "=== Seed binary file type ==="
          file dist/seed-linux-${{ matrix.arch }}

          echo ""
          echo "=== Seed version smoke test ==="
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            qemu-aarch64-static dist/seed-linux-${{ matrix.arch }} --version || qemu-aarch64-static dist/seed-linux-${{ matrix.arch }} version || echo "Version flag not supported, checking binary runs..."
          else
            ./dist/seed-linux-${{ matrix.arch }} --version || ./dist/seed-linux-${{ matrix.arch }} version || echo "Version flag not supported, checking binary runs..."
          fi
          echo "✅ Seed binary smoke test passed"

          echo ""
          echo "=== iperf3 binary file type ==="
          file bin/iperf3-linux-${{ matrix.arch }}

          echo ""
          echo "=== iperf3 version smoke test ==="
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            qemu-aarch64-static bin/iperf3-linux-${{ matrix.arch }} --version
          else
            ./bin/iperf3-linux-${{ matrix.arch }} --version
          fi
          echo "✅ iperf3 binary smoke test passed"

      - name: Create release packages
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          PKG_VERSION=$(echo "${VERSION#v}" | sed 's/-dirty$//;s/-[0-9]*-g[0-9a-f]*$//')

          # Create .tar.gz package
          mkdir -p release/seed-${VERSION}-linux-${ARCH}
          cp dist/seed-linux-${ARCH} release/seed-${VERSION}-linux-${ARCH}/seed
          cp bin/iperf3-linux-${ARCH} release/seed-${VERSION}-linux-${ARCH}/iperf3
          chmod +x release/seed-${VERSION}-linux-${ARCH}/*
          cp -r configs release/seed-${VERSION}-linux-${ARCH}/
          cp -r ui/dist release/seed-${VERSION}-linux-${ARCH}/ui/
          cd release
          tar -czvf seed-${VERSION}-linux-${ARCH}.tar.gz seed-${VERSION}-linux-${ARCH}
          cd ..

          # Create .deb package
          DEB_DIR="dist/deb"
          mkdir -p $DEB_DIR/DEBIAN
          mkdir -p $DEB_DIR/usr/bin
          mkdir -p $DEB_DIR/usr/lib/systemd/system
          mkdir -p $DEB_DIR/var/lib/seed
          mkdir -p $DEB_DIR/var/log/seed

          cp dist/seed-linux-${ARCH} $DEB_DIR/usr/bin/seed
          chmod 755 $DEB_DIR/usr/bin/seed
          cp deploy/deb/seed.service $DEB_DIR/usr/lib/systemd/system/

          sed "s/__VERSION__/${PKG_VERSION}/;s/__ARCHITECTURE__/${ARCH}/" \
            deploy/deb/control > $DEB_DIR/DEBIAN/control

          cp deploy/deb/postinst $DEB_DIR/DEBIAN/
          cp deploy/deb/prerm $DEB_DIR/DEBIAN/
          cp deploy/deb/postrm $DEB_DIR/DEBIAN/
          chmod 755 $DEB_DIR/DEBIAN/postinst $DEB_DIR/DEBIAN/prerm $DEB_DIR/DEBIAN/postrm

          dpkg-deb --build $DEB_DIR release/seed_${PKG_VERSION}_${ARCH}.deb

          # Create .rpm package
          RPM_ARCH=${ARCH}
          if [ "${ARCH}" = "amd64" ]; then
            RPM_ARCH="x86_64"
          elif [ "${ARCH}" = "arm64" ]; then
            RPM_ARCH="aarch64"
          fi

          # Copy binary to repo root for rpmbuild (spec expects %{_repo_root}/seed)
          cp dist/seed-linux-${ARCH} seed

          sed "s/__VERSION__/${PKG_VERSION}/;s/__ARCHITECTURE__/${RPM_ARCH}/" \
            deploy/rpm/seed.spec > seed.spec

          rpmbuild --target "${RPM_ARCH}" \
            --define "_repo_root $(pwd)" \
            --define "_topdir $(pwd)/rpmbuild" \
            --define "_rpmdir $(pwd)/release" \
            -bb seed.spec

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.arch }}
          path: |
            release/*.tar.gz
            release/*.deb
            release/*.rpm

  # ===========================================================================
  # Build macOS Release (closes #474)
  # ===========================================================================
  release-macos:
    name: Create macOS Release
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
            goarch: arm64
          - os: macos-13
            arch: amd64
            goarch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.2.1"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install libpcap
        run: |
          # macOS has libpcap pre-installed, but ensure headers are available
          brew list libpcap || brew install libpcap

      - name: Build frontend
        run: |
          cd ui
          npm ci
          npm run build

      - name: Build The Seed for macOS
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        run: |
          go build -trimpath -buildvcs=false \
            -ldflags="-s -w -X github.com/krisarmstrong/seed/internal/version.Version=${{ github.ref_name }}" \
            -o dist/seed-darwin-${{ matrix.arch }} ./cmd/seed

      - name: Verify binary (smoke test)
        run: |
          echo "=== Binary file type ==="
          file dist/seed-darwin-${{ matrix.arch }}

          echo ""
          echo "=== Version smoke test ==="
          ./dist/seed-darwin-${{ matrix.arch }} --version || ./dist/seed-darwin-${{ matrix.arch }} version || echo "Version flag check"
          echo "✅ macOS binary smoke test passed"

      - name: Create release packages
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          PKG_VERSION=$(echo "${VERSION#v}" | sed 's/-dirty$//;s/-[0-9]*-g[0-9a-f]*$//')

          # Create .tar.gz package
          mkdir -p release/seed-${VERSION}-darwin-${ARCH}
          cp dist/seed-darwin-${ARCH} release/seed-${VERSION}-darwin-${ARCH}/seed
          chmod +x release/seed-${VERSION}-darwin-${ARCH}/*
          cp -r configs release/seed-${VERSION}-darwin-${ARCH}/
          cp -r ui/dist release/seed-${VERSION}-darwin-${ARCH}/ui/
          cd release
          tar -czvf seed-${VERSION}-darwin-${ARCH}.tar.gz seed-${VERSION}-darwin-${ARCH}
          cd ..

          # Create .pkg installer
          chmod +x deploy/macos/build-pkg.sh
          ./deploy/macos/build-pkg.sh ./dist/seed-darwin-${ARCH} ${PKG_VERSION}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-darwin-${{ matrix.arch }}
          path: |
            release/*.tar.gz
            dist/*.pkg

  # ===========================================================================
  # Build Windows Release
  # ===========================================================================
  release-windows:
    name: Create Windows Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.2.1"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build frontend
        run: |
          cd ui
          npm ci
          npm run build

      - name: Build The Seed for Windows
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
        run: |
          go build -trimpath -buildvcs=false \
            -ldflags="-s -w -X github.com/krisarmstrong/seed/internal/version.Version=${VERSION}" \
            -o dist/seed-windows-amd64.exe ./cmd/seed

      - name: Verify binary
        run: |
          file dist/seed-windows-amd64.exe
          echo "Windows amd64 binary built"

      - name: Create Windows distribution
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(echo "${VERSION#v}" | sed 's/-dirty$//;s/-[0-9]*-g[0-9a-f]*$//')
          PKG_NAME="seed-${PKG_VERSION}-windows-amd64"
          mkdir -p "release/${PKG_NAME}"
          cp dist/seed-windows-amd64.exe "release/${PKG_NAME}/seed.exe"
          cp deploy/windows/build.ps1 "release/${PKG_NAME}/install.ps1"
          cp -r configs "release/${PKG_NAME}/"
          cp -r ui/dist "release/${PKG_NAME}/ui/"
          cd release
          zip -r "${PKG_NAME}.zip" "${PKG_NAME}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-amd64
          path: release/*.zip

  # ===========================================================================
  # Publish Release
  # ===========================================================================
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [release, release-macos, release-windows]
    permissions:
      contents: write
      id-token: write  # Required for cosign OIDC signing

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all release artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p dist
          find artifacts -name "*.tar.gz" -exec cp {} dist/ \;
          find artifacts -name "*.deb" -exec cp {} dist/ \;
          find artifacts -name "*.rpm" -exec cp {} dist/ \;
          find artifacts -name "*.pkg" -exec cp {} dist/ \;
          find artifacts -name "*.zip" -exec cp {} dist/ \;
          cd dist
          sha256sum * > checksums.txt 2>/dev/null || true
          cat checksums.txt

      - name: Install Syft for SBOM generation
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOMs for packages
        run: |
          cd dist
          for pkg in *.tar.gz; do
            echo "Generating SBOM for ${pkg}..."
            syft "${pkg}" -o cyclonedx-json > "${pkg%.tar.gz}.sbom.json"
          done

      - name: Install Cosign for signing
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts with cosign (keyless OIDC)
        run: |
          cd dist
          for file in *.tar.gz *.deb *.rpm *.pkg *.zip checksums.txt *.sbom.json; do
            if [ -f "${file}" ]; then
              echo "Signing ${file}..."
              cosign sign-blob --yes --bundle "${file}.cosign.bundle" "${file}"
            fi
          done

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" -20)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get versions
        id: versions
        run: |
          GO_VERSION=$(curl -s 'https://go.dev/VERSION?m=text' | head -1)
          NODE_VERSION=$(curl -s https://nodejs.org/dist/index.json | jq -r '[.[] | select(.lts != false)][0].version')
          IPERF_VERSION=$(curl -s https://api.github.com/repos/esnet/iperf/releases/latest | jq -r '.tag_name')
          echo "go=$GO_VERSION" >> $GITHUB_OUTPUT
          echo "node=$NODE_VERSION" >> $GITHUB_OUTPUT
          echo "iperf3=$IPERF_VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ## Build Information

            | Component | Version |
            |-----------|---------|
            | Go | ${{ steps.versions.outputs.go }} |
            | Node.js | ${{ steps.versions.outputs.node }} |
            | iperf3 | ${{ steps.versions.outputs.iperf3 }} |

            ## Checksums

            ```
            $(cat dist/checksums.txt)
            ```

            ## Installation

            ### Debian/Ubuntu Package (Recommended)

            **AMD64:**
            ```bash
            curl -LO https://github.com/krisarmstrong/seed/releases/download/${{ github.ref_name }}/seed_${{ github.ref_name }}_amd64.deb
            sudo dpkg -i seed_${{ github.ref_name }}_amd64.deb
            ```

            **ARM64:**
            ```bash
            curl -LO https://github.com/krisarmstrong/seed/releases/download/${{ github.ref_name }}/seed_${{ github.ref_name }}_arm64.deb
            sudo dpkg -i seed_${{ github.ref_name }}_arm64.deb
            ```

            ### Fedora/RHEL Package

            **x86_64:**
            ```bash
            curl -LO https://github.com/krisarmstrong/seed/releases/download/${{ github.ref_name }}/seed-${{ github.ref_name }}.x86_64.rpm
            sudo rpm -i seed-${{ github.ref_name }}.x86_64.rpm
            ```

            **aarch64:**
            ```bash
            curl -LO https://github.com/krisarmstrong/seed/releases/download/${{ github.ref_name }}/seed-${{ github.ref_name }}.aarch64.rpm
            sudo rpm -i seed-${{ github.ref_name }}.aarch64.rpm
            ```

            ### macOS (.pkg Installer - Recommended)

            **Apple Silicon (M1/M2/M3):**
            ```bash
            curl -LO https://github.com/krisarmstrong/seed/releases/download/${{ github.ref_name }}/seed-<version>-arm64.pkg
            sudo installer -pkg seed-*-arm64.pkg -target /
            ```

            **Intel Mac:**
            ```bash
            curl -LO https://github.com/krisarmstrong/seed/releases/download/${{ github.ref_name }}/seed-<version>-amd64.pkg
            sudo installer -pkg seed-*-amd64.pkg -target /
            ```

            ### macOS (tar.gz - Manual)

            ```bash
            curl -LO https://github.com/krisarmstrong/seed/releases/download/${{ github.ref_name }}/seed-${{ github.ref_name }}-darwin-arm64.tar.gz
            tar -xzf seed-${{ github.ref_name }}-darwin-arm64.tar.gz
            cd seed-${{ github.ref_name }}-darwin-arm64
            sudo mv seed /usr/local/bin/
            ```

            > **Note:** macOS builds do not include bundled iperf3. Install via `brew install iperf3` if needed.

            ### Windows

            ```powershell
            # Download and extract
            Invoke-WebRequest -Uri "https://github.com/krisarmstrong/seed/releases/download/${{ github.ref_name }}/seed-<version>-windows-amd64.zip" -OutFile seed.zip
            Expand-Archive seed.zip -DestinationPath .
            cd seed-*-windows-amd64

            # Install as service (Run as Administrator)
            .\install.ps1
            ```

            ### Linux Manual Installation (tar.gz)

            **Linux AMD64:**
            ```bash
            curl -LO https://github.com/krisarmstrong/seed/releases/download/${{ github.ref_name }}/seed-${{ github.ref_name }}-linux-amd64.tar.gz
            tar -xzf seed-${{ github.ref_name }}-linux-amd64.tar.gz
            cd seed-${{ github.ref_name }}-linux-amd64
            sudo mv seed iperf3 /usr/local/bin/
            ```

            **Linux ARM64:**
            ```bash
            curl -LO https://github.com/krisarmstrong/seed/releases/download/${{ github.ref_name }}/seed-${{ github.ref_name }}-linux-arm64.tar.gz
            tar -xzf seed-${{ github.ref_name }}-linux-arm64.tar.gz
            cd seed-${{ github.ref_name }}-linux-arm64
            sudo mv seed iperf3 /usr/local/bin/
            ```

            ## Package Contents

            **Linux packages include:**
            - `seed` - Main application binary
            - `iperf3` - Bundled iperf3 binary
            - `configs/` - Default configuration files
            - `ui/` - Frontend assets

            **macOS packages include:**
            - `seed` - Main application binary
            - `configs/` - Default configuration files
            - `ui/` - Frontend assets

            ## Supply Chain Security

            All release artifacts include:
            - **SBOM** (Software Bill of Materials) in CycloneDX JSON format
            - **Cosign signatures** for cryptographic verification

            Verify signatures with:
            ```bash
            cosign verify-blob \
              --bundle seed-${{ github.ref_name }}-linux-amd64.tar.gz.cosign.bundle \
              --certificate-identity-regexp='https://github.com/krisarmstrong/seed' \
              --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \
              seed-${{ github.ref_name }}-linux-amd64.tar.gz
            ```
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/*.pkg
            dist/*.zip
            dist/checksums.txt
            dist/*.sbom.json
            dist/*.cosign.bundle
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
