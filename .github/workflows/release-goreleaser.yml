# =============================================================================
# Release via goreleaser (parallel-rollout candidate)
# =============================================================================
# Side-by-side with the existing release.yml. workflow_dispatch only — never
# auto-triggers on tag push. Used to validate that .goreleaser.yml produces
# artifacts equivalent to release.yml's output before we swap the cutover.
#
# Uses the goreleaser-cross Docker image which ships:
#   - gcc + gcc-aarch64-linux-gnu (Linux cross)
#   - mingw-w64 (Windows cross; we use CGO_ENABLED=0 there)
#   - osxcross + macOS SDK (Darwin cross)
#   - libpcap headers for all targets
# That sidesteps the cross-compile problem the first dry-run hit (#956).
# =============================================================================

name: Release (goreleaser, parallel rollout)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Snapshot build only — do not publish or sign"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write # cosign keyless OIDC
  packages: write

jobs:
  # =========================================================================
  # iperf3 binaries — same matrix as release.yml's build-iperf3 job.
  # Built on native runners; goreleaser picks them up from bin/.
  # =========================================================================
  build-iperf3:
    name: Build iperf3 (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool

      - name: Get latest iperf3 version
        id: iperf3_version
        run: |
          LATEST=$(curl -s https://api.github.com/repos/esnet/iperf/releases/latest | jq -r '.tag_name')
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Download and build iperf3
        run: |
          VERSION="${{ steps.iperf3_version.outputs.version }}"
          curl -L -o iperf3.tar.gz "https://github.com/esnet/iperf/archive/refs/tags/${VERSION}.tar.gz"
          tar -xzf iperf3.tar.gz
          cd iperf-*
          if [ ! -f configure ]; then ./bootstrap.sh || autoreconf -i; fi
          ./configure --prefix=/tmp/iperf3-install --disable-shared --enable-static-bin
          make -j$(nproc)
          make install
          mkdir -p ../dist
          cp /tmp/iperf3-install/bin/iperf3 ../dist/iperf3-linux-${{ matrix.arch }}
          chmod +x ../dist/iperf3-linux-${{ matrix.arch }}

      - name: Upload iperf3 artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: iperf3-linux-${{ matrix.arch }}
          path: dist/iperf3-linux-${{ matrix.arch }}
          retention-days: 1

  # =========================================================================
  # UI build — done outside the goreleaser-cross container because that
  # image is Go-focused and doesn't ship Node. We build ui/dist here and
  # the next job inherits the workspace.
  # =========================================================================
  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    outputs:
      ui_hash: ${{ steps.ui-hash.outputs.hash }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "25.2.1"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: |
          cd ui
          npm ci
          npm run build

      - name: Compute UI build hash
        id: ui-hash
        run: |
          UI_BUILD_HASH=$(find ui/dist -type f -exec md5sum {} \; | sort | md5sum | cut -d' ' -f1)
          echo "hash=$UI_BUILD_HASH" >> "$GITHUB_OUTPUT"

      - name: Upload UI dist
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 1
          include-hidden-files: true

  # =========================================================================
  # goreleaser build + publish — runs inside goreleaser-cross container
  # so all cross-compile toolchains are present.
  # =========================================================================
  goreleaser:
    name: goreleaser ${{ inputs.dry_run && '(snapshot)' || '(release)' }}
    runs-on: ubuntu-latest
    needs: [build-iperf3, build-ui]
    container:
      image: ghcr.io/goreleaser/goreleaser-cross:v2.5.1
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Mark workspace as safe (container runs as root)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download iperf3 artifacts (amd64 + arm64)
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: iperf3-linux-*
          path: bin/
          merge-multiple: true

      - name: Restore iperf3 executable bits
        run: chmod +x bin/iperf3-linux-*

      - name: Download UI dist
        uses: actions/download-artifact@v8.0.1
        with:
          name: ui-dist
          path: ui/dist/

      - name: Install Syft (SBOM) inside container
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Install Cosign inside container
        run: |
          COSIGN_VERSION=v2.4.1
          curl -sSfL -o /usr/local/bin/cosign "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
          chmod +x /usr/local/bin/cosign

      - name: Run goreleaser (snapshot/dry-run)
        if: inputs.dry_run
        env:
          UI_BUILD_HASH: ${{ needs.build-ui.outputs.ui_hash }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: goreleaser release --snapshot --clean --skip=publish,announce

      - name: Run goreleaser (publish)
        if: ${{ !inputs.dry_run }}
        env:
          UI_BUILD_HASH: ${{ needs.build-ui.outputs.ui_hash }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: goreleaser release --clean

      - name: Upload dry-run artifact bundle for inspection
        if: inputs.dry_run
        uses: actions/upload-artifact@v7.0.1
        with:
          name: goreleaser-dryrun-${{ github.run_id }}
          path: dist/
          retention-days: 14
