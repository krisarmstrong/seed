services:
  netscope:
    build: .
    ports:
      - "8080:8080"
      - "8443:8443"
    cap_add:
      - NET_RAW      # Required for packet capture (LLDP/CDP/DHCP)
      - NET_ADMIN    # Required for interface management
    networks:
      - netscope-lan
      - netscope-mgmt
    environment:
      - NETSCOPE_PORT=8080
      - NETSCOPE_HTTPS=false
    volumes:
      - ./configs:/app/configs:ro
      - netscope-certs:/app/certs
    restart: unless-stopped

  # Development service with hot reload
  netscope-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
      - "5173:5173"  # Vite dev server
    cap_add:
      - NET_RAW
      - NET_ADMIN
    networks:
      - netscope-lan
    volumes:
      - .:/app
      - /app/web/node_modules
    environment:
      - NETSCOPE_PORT=8080
      - NETSCOPE_HTTPS=false
    profiles:
      - dev

networks:
  # Primary test network
  netscope-lan:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1

  # Secondary network for multi-interface testing
  netscope-mgmt:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/24
          gateway: 172.29.0.1

volumes:
  netscope-certs:
