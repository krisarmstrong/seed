version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # Core linters - must pass
    - errcheck       # Check unchecked errors
    - govet          # Reports suspicious constructs
    - ineffassign    # Detect ineffectual assignments
    - staticcheck    # Go static analysis
    - unused         # Checks for unused code
    - misspell       # Find misspellings
    - unconvert      # Remove unnecessary type conversions
    - bodyclose      # Check HTTP response body is closed
    - gocritic       # Comprehensive linting
    - gosec          # Security-focused linter
    - prealloc       # Suggest preallocations
    # Pro linters - quality improvements
    - nilerr         # Check for returning nil when err is not nil
    - nilnil         # Check for returning nil, nil
    - copyloopvar    # Detects loop variable capture issues (Go 1.22+)
    - unparam        # Detect unused function parameters
    - godot          # Check that comments end with a period
    - nolintlint     # Ensure nolint directives are valid and explained
    - revive         # Comprehensive linter (successor to golint)
    - goconst        # Find repeated strings that could be constants
    - dupl           # Detect code duplication
    - gocyclo        # Check cyclomatic complexity
    - maintidx       # Check maintainability index
    - exhaustive     # Check exhaustiveness of enum switch statements
    - intrange       # Find places where for loops could use integer range
    # Naming & style linters
    - predeclared    # Find code shadowing predeclared identifiers
    - testifylint    # Check testify usage patterns

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    misspell:
      locale: US
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
    gosec:
      excludes:
        - G104  # Unhandled errors (covered by errcheck)
    gocyclo:
      min-complexity: 15
    dupl:
      threshold: 100
    goconst:
      min-len: 3
      min-occurrences: 3
    maintidx:
      under: 20
    predeclared:
      # Check for shadowing predeclared identifiers like 'error', 'string', 'len'
      ignore: []
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

  exclusions:
    presets:
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - dupl
          - goconst
      # 'api' is a meaningful package name for HTTP API handlers
      - path: internal/api/
        text: "var-naming: avoid meaningless package names"

output:
  sort-order:
    - linter
    - file
  show-stats: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/krisarmstrong/seed
