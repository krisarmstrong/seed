version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # Core linters - must pass
    - errcheck       # Check unchecked errors
    - govet          # Reports suspicious constructs
    - ineffassign    # Detect ineffectual assignments
    - staticcheck    # Go static analysis
    - unused         # Checks for unused code
    - misspell       # Find misspellings
    - unconvert      # Remove unnecessary type conversions
    - bodyclose      # Check HTTP response body is closed
    - gocritic       # Comprehensive linting
    - gosec          # Security-focused linter
    - prealloc       # Suggest preallocations
    # Pro linters - quality improvements
    - nilerr         # Check for returning nil when err is not nil
    - nilnil         # Check for returning nil, nil
    - copyloopvar    # Detects loop variable capture issues (Go 1.22+)
    - unparam        # Detect unused function parameters
    - godot          # Check that comments end with a period
    - nolintlint     # Ensure nolint directives are valid and explained
    - revive         # Comprehensive linter (successor to golint)
    - goconst        # Find repeated strings that could be constants
    - dupl           # Detect code duplication
    - gocyclo        # Check cyclomatic complexity
    - maintidx       # Check maintainability index
    - exhaustive     # Check exhaustiveness of enum switch statements
    - intrange       # Find places where for loops could use integer range
    # Naming & style linters
    - predeclared    # Find code shadowing predeclared identifiers
    - testifylint    # Check testify usage patterns
    # Database safety
    - sqlclosecheck  # Ensure SQL rows/statements are closed
    - rowserrcheck   # Check sql.Rows.Err() is called

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    misspell:
      locale: US
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - opinionated
    gosec:
      excludes:
        - G104  # Unhandled errors (covered by errcheck)
    gocyclo:
      min-complexity: 15
    dupl:
      threshold: 100
    goconst:
      min-len: 3
      min-occurrences: 3
    maintidx:
      under: 20
    predeclared:
      # Check for shadowing predeclared identifiers like 'error', 'string', 'len'
      ignore: []
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

  exclusions:
    presets:
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - dupl
          - goconst
      # 'api' is a meaningful package name for HTTP API handlers
      - path: internal/api/
        text: "var-naming: avoid meaningless package names"
      # System paths in /sys and /run are legitimate absolute paths
      - linters:
          - gocritic
        text: "filepathJoin.*contains a path separator"
      # Low-level ioctl operations require unsafe pointers
      - path: internal/cable/
        linters:
          - gosec
        text: "G103: Use of unsafe calls"
      # Reading /sys filesystem files is safe (not user-controlled paths)
      - path: internal/network/detection/
        linters:
          - gosec
        text: "G304: Potential file inclusion"
      # SQL fragments are more readable inline than as constants
      - path: internal/database/
        linters:
          - goconst
      # NDP state constants match kernel naming convention
      - path: internal/discovery/ndp_linux.go
        linters:
          - goconst
      # ARP state constants match kernel naming convention
      - path: internal/discovery/arp_linux.go
        linters:
          - revive
        text: "var-naming: don't use ALL_CAPS"
      # British spelling 'neighbour' matches kernel header file name
      - path: internal/discovery/arp_linux.go
        linters:
          - misspell
        text: "neighbour"
      # Heatmap type aliases are intentional for user-friendly API
      - path: internal/survey/
        linters:
          - goconst
      # CVE severity strings match NVD API values
      - path: internal/discovery/cve_nvd.go
        linters:
          - goconst
      # Log levels are well-known strings, constants reduce readability
      - path: internal/logging/
        linters:
          - goconst
      # WiFi security type strings match standard values
      - path: internal/wifi/wifi.go
        linters:
          - goconst
      # IPv4 and IPv6 route handling is intentionally similar
      - path: internal/gateway/gateway_linux.go
        linters:
          - dupl
      # SNMP v2c and v3 wrappers have similar structure by design
      - path: internal/snmp/interface.go
        linters:
          - dupl
      # DNS resolver path is system path, not user input
      - path: internal/dns/dns_linux.go
        linters:
          - gosec
        text: "G304"

output:
  sort-results: true
  sort-order:
    - linter
    - file
  show-stats: true

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/krisarmstrong/seed
