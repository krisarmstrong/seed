server:
    port: 8443
    https: true
    cert_file: ""
    key_file: ""
    log_access_header: X-Log-Token
interface:
    default: ""
    fallbacks: []
    startup_retries: 3
    startup_retry_wait: 5s
vlan:
    enabled: false
    id: 0
ip:
    mode: dhcp
discovery:
    protocol: auto
    timeout: 30s
network_discovery:
    profile: standard
    custom_options:
        passive_listen: true
        arp_scan: true
        icmp_scan: true
        port_scan:
            enabled: false
            tcp_ports: ""
            udp_ports: ""
        traceroute: false
        snmp_query: false
    timing:
        probe_interval: 75ms
        rescan_interval: 10m0s
        workers: 50
    additional_subnets: []
    enabled: true
    arp_scan_workers: 50
    ping_timeout: 500ms
    scan_timeout: 30s
    auto_scan: true
    scan_interval: 0s
    oui_file_path: oui.txt
    oui_max_age: 720h0m0s
    ipv6_enabled: true
dns:
    test_hostname: google.com
    timeout: 5s
tests:
    ping_targets: []
    tcp_ports: []
    udp_ports: []
    http_endpoints: []
    run_performance: true
    run_speedtest: true
    run_iperf: true
    run_discovery: true
speedtest:
    server_id: ""
    auto_run_on_link: false
iperf:
    auto_run_on_link: false
    server: ""
    port: 5201
    protocol: tcp
    direction: download
    duration: 10
    server_port: 5201
    enable_server: false
thresholds:
    dhcp:
        total:
            warning: 500ms
            critical: 2s
        per_phase:
            warning: 200ms
            critical: 1s
    dns:
        warning: 100ms
        critical: 500ms
    ping:
        warning: 50ms
        critical: 200ms
    wifi:
        signal:
            warning: -70
            critical: -80
    link:
        flap_count_24h:
            warning: 3
            critical: 5
    custom_tests:
        ping:
            warning: 50ms
            critical: 100ms
        tcp:
            warning: 100ms
            critical: 500ms
        udp:
            warning: 100ms
            critical: 500ms
        http:
            warning: 500ms
            critical: 2s
        http_timings:
            dns:
                warning: 100ms
                critical: 500ms
            tcp:
                warning: 100ms
                critical: 500ms
            tls:
                warning: 150ms
                critical: 500ms
            ttfb:
                warning: 500ms
                critical: 2s
        cert_expiry:
            warning: 30
            critical: 7
auth:
    default_username: admin
    default_password_hash: ""
    session_timeout: 24h0m0s
    jwt_secret: tAXZ0wHph1gCHwO8v3N3cVTfk6eeZfIH5ELmVYAC3qw=
security:
    allowed_origins: []
    vulnerability_scanning:
        enabled: false
        cve_database: nvd
        nvd_api_key: ""
        update_interval: 86400
        severity_threshold: medium
        max_concurrent: 5
        auto_scan: false
dhcp:
    rogue_detection:
        enabled: false
        known_servers: []
        alert_on_detection: false
snmp:
    communities:
        - public
    timeout: 5s
    retries: 2
    port: 161
fab_options:
    run_link: true
    run_switch: true
    run_vlan: true
    run_ip_config: true
    run_gateway: true
    run_dns: true
    run_health_checks: true
    run_network_discovery: false
    run_speedtest: false
    run_iperf: false
    run_performance: false
    auto_scan_on_link: true
display_options:
    show_public_ip: true
