# =============================================================================
# The Seed - Default Configuration
# =============================================================================
# This is the default configuration shipped with The Seed.
# On first run, the setup wizard will prompt for admin credentials.
#
# Configuration precedence:
# 1. Environment variables (SEED_*)
# 2. Config file (this file)
# 3. Built-in defaults (see internal/config/config.go)
#
# For production, copy this file and customize for your environment.
# =============================================================================

# Server configuration
server:
  port: 8443              # HTTPS port (use 443 in production with proper permissions)
  https: true             # Always use HTTPS in production
  cert_file: ""           # Path to TLS certificate (auto-generated if empty)
  key_file: ""            # Path to TLS private key (auto-generated if empty)

# Network interface configuration
interface:
  default: ""             # Auto-detect if empty
  fallbacks:
    - eth0
    - enp0s1
    - enp0s3
    - en0
    - wlan0

# VLAN configuration
vlan:
  enabled: false
  id: 0

# IP configuration
ip:
  mode: dhcp              # dhcp or static

# Network discovery
discovery:
  protocol: auto          # auto, arp, icmp
  timeout: 30s

# DNS testing
dns:
  test_hostname: google.com
  timeout: 5s

# Health checks - corresponds to the "Health Checks" card in the UI
health_checks:
  ping_targets:
    - name: "Google"
      host: www.google.com
      enabled: true
    - name: "Cloudflare"
      host: 1.1.1.1
      enabled: true
  tcp_ports:
    - name: "HTTP"
      host: www.google.com
      port: 80
      enabled: true
    - name: "HTTPS"
      host: www.google.com
      port: 443
      enabled: true
    - name: "DICOM"
      host: example-dicom.local
      port: 104
      enabled: false   # disabled by default to avoid false failures
    - name: "FTP"
      host: ftp.debian.org
      port: 21
      enabled: false   # optional; enable if your network allows FTP
    - name: "SMB"
      host: files.example.com
      port: 445
      enabled: false
    - name: "RTSP"
      host: rtsp.example.com
      port: 554
      enabled: false
    - name: "PostgreSQL"
      host: db.example.com
      port: 5432
      enabled: false
    - name: "SFTP"
      host: sftp.example.com
      port: 22
      enabled: false
  udp_ports:
    - name: "DNS"
      host: 8.8.8.8
      port: 53
      enabled: true
    - name: "NTP"
      host: time.google.com
      port: 123
      enabled: true
  http_endpoints:
    - name: "Google HTTPS"
      url: https://www.google.com
      expected_status: 200
      enabled: true
    - name: "Cloudflare"
      url: https://www.cloudflare.com
      expected_status: 200
      enabled: true
    - name: "Example HTTP"
      url: http://example.com
      expected_status: 200
      enabled: true

# Speed test configuration
speedtest:
  server_id: ""           # Auto-select if empty
  auto_run_on_link: false

# Alert thresholds
thresholds:
  dhcp:
    total:
      warning: 500ms
      critical: 2s
    per_phase:
      warning: 200ms
      critical: 1s
  dns:
    warning: 100ms
    critical: 500ms
  ping:
    warning: 50ms
    critical: 200ms
  wifi:
    signal:
      warning: -70
      critical: -80
  link:
    flap_count_24h:
      warning: 3
      critical: 5
  custom_tests:
    ping:
      warning: 50ms
      critical: 100ms
    tcp:
      warning: 100ms
      critical: 500ms
    udp:
      warning: 100ms
      critical: 500ms
    http:
      warning: 500ms
      critical: 2s
    cert_expiry:
      warning: 30
      critical: 7

# Authentication
# IMPORTANT: Empty password_hash triggers the setup wizard on first run.
# Never commit a config file with credentials to version control.
auth:
  default_username: admin
  default_password_hash: ""   # Empty = setup wizard on first run
  session_timeout: 24h
  jwt_secret: ""              # Auto-generated on first run if empty

# SNMP configuration
snmp:
  communities:
    - public
  v3_credentials: []
  timeout: 5s
  retries: 2
  port: 161

# Logging configuration
logging:
  level: info             # debug, info, warn, error
  format: text            # text or json
  add_source: false       # Include file:line in logs
  file: ""                # Log file path (empty = stdout only)
  max_size: 100           # Max MB per log file before rotation
  max_backups: 5          # Number of old files to keep
  max_age: 30             # Days to keep old files
  compress: true          # Compress rotated files
