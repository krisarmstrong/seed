# =============================================================================
# goreleaser config for The Seed
# =============================================================================
# Canonical release packager. Driven by .github/workflows/release.yml inside
# the goreleaser-cross container (which ships gcc + osxcross + mingw-w64).
#
# Covers natively:
#   - Multi-arch builds (linux/darwin/windows × amd64/arm64)
#   - Archives (.tar.gz, .zip), Linux packages (.deb, .rpm) via nfpm
#   - ldflags injection (Version, Commit, BuildTime, UIBuildHash)
#   - cosign keyless signing of every artifact
#   - syft SBOM per archive
#   - SHA-256 checksums
#   - Homebrew tap publish (when HOMEBREW_TAP_TOKEN is set)
#   - release-please CHANGELOG.md as release body
#
# Handled outside goreleaser by sidecar jobs in release.yml:
#   - iperf3 binary bundled into Linux archives — pre-built by the
#     build-iperf3 matrix; goreleaser picks it up from bin/ via archive files
#   - UI frontend (npm run build) — pre-built by the build-ui job and
#     downloaded into ui/dist/ before the Go build embeds it
#   - SLSA L3 provenance — slsa-github-generator v2 reads goreleaser's
#     artifact hashes via its outputs.hashes step
#
# Not produced from this config:
#   - macOS .pkg installer (no native pkgbuild from Linux). macOS users get
#     the .tar.gz; deploy/macos/build-pkg.sh stays in-tree for local builds.
#
# Tested against goreleaser v2.x.
# =============================================================================

version: 2

project_name: seed

before:
  hooks:
    - go mod download
    # The UI build runs BEFORE goreleaser (in the build-ui job inside
    # release.yml). Vite writes directly to internal/api/ui/, and the
    # artifact is downloaded into the same path. Verify it's there before
    # kicking off the Go build that embeds it.
    - bash -c 'test -d internal/api/ui && test -n "$(ls -A internal/api/ui)" || (echo "internal/api/ui empty — UI build step failed or artifact missing"; exit 1)'

builds:
  - id: seed-linux
    main: ./cmd/seed
    binary: seed
    env:
      - CGO_ENABLED=1
    goos: [linux]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags: &ldflags
      - -s -w
      - -X github.com/krisarmstrong/seed/internal/version.Version={{.Version}}
      - -X github.com/krisarmstrong/seed/internal/version.Commit={{.Commit}}
      - -X github.com/krisarmstrong/seed/internal/version.BuildTime={{.Date}}
      - -X github.com/krisarmstrong/seed/internal/version.UIBuildHash={{.Env.UI_BUILD_HASH}}
    # Per-target cross-compile settings. goreleaser-cross has all of
    # these toolchains preinstalled; without them, building linux/arm64
    # from an amd64 host fails on cgo runtime ARM64 assembly.
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
          - PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig

  - id: seed-darwin
    main: ./cmd/seed
    binary: seed
    env:
      - CGO_ENABLED=1
    goos: [darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags: *ldflags
    # macOS cross-compile via osxcross (bundled in goreleaser-cross).
    # The CC paths are stable inside the container image.
    overrides:
      - goos: darwin
        goarch: amd64
        env:
          - CC=o64-clang
          - CXX=o64-clang++
      - goos: darwin
        goarch: arm64
        env:
          - CC=oa64-clang
          - CXX=oa64-clang++

  - id: seed-windows
    main: ./cmd/seed
    binary: seed
    # Windows: CGO disabled (gopacket/pcap fork handles arm64 build without
    # native libpcap-windows toolchain). Matches release.yml.
    env:
      - CGO_ENABLED=0
    goos: [windows]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags: *ldflags

archives:
  - id: linux-archive
    ids: [seed-linux]
    name_template: "seed-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    files:
      - src: configs
        dst: configs
      - src: internal/api/ui
        dst: ui
      # iperf3 binary, pre-built by the build-iperf3 job and downloaded into
      # bin/ before goreleaser runs. One per arch.
      - src: "bin/iperf3-linux-{{ .Arch }}"
        dst: iperf3
        info:
          mode: 0o755

  - id: darwin-archive
    ids: [seed-darwin]
    name_template: "seed-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats: [tar.gz]
    files:
      - src: configs
        dst: configs
      - src: internal/api/ui
        dst: ui

  - id: windows-archive
    ids: [seed-windows]
    name_template: "seed-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats: [zip]
    files:
      - src: configs
        dst: configs
      - src: internal/api/ui
        dst: ui
      - src: deploy/windows/build.ps1
        dst: install.ps1

# Linux .deb + .rpm via nfpm (built into goreleaser). Port of .nfpm.yaml.
nfpms:
  - id: linux-packages
    ids: [seed-linux]
    package_name: seed
    vendor: Mustard Seed Networks
    homepage: https://github.com/krisarmstrong/seed
    maintainer: Kris Armstrong <kris.armstrong@icloud.com>
    description: |
      The Seed - Network Diagnostic Tool by Mustard Seed Networks
      .
      The Seed is a professional-grade network diagnostic appliance designed
      for network technicians and engineers. Plug it into any network jack
      and instantly see link status, switch information, DHCP details, DNS
      health, gateway connectivity, Wi-Fi survey data, and vulnerability
      findings.
    license: BSL-1.1
    section: net
    priority: optional
    formats:
      - deb
      - rpm
    file_name_template: >-
      {{- if eq .ConventionalExtension ".deb" -}}
        seed_{{ .Version }}_{{ .Arch }}
      {{- else if eq .ConventionalExtension ".rpm" -}}
        {{- $rpmarch := .Arch -}}
        {{- if eq .Arch "amd64" }}{{ $rpmarch = "x86_64" }}{{ end -}}
        {{- if eq .Arch "arm64" }}{{ $rpmarch = "aarch64" }}{{ end -}}
        seed-{{ .Version }}-1.{{ $rpmarch }}
      {{- end -}}
    dependencies:
      - systemd
    overrides:
      deb:
        dependencies:
          - libpcap0.8 | libpcap0.8t64
          - systemd
          - libcap2-bin
      rpm:
        dependencies:
          - libpcap
          - systemd
          - libcap
    contents:
      - src: ./deploy/deb/seed.service
        dst: /usr/lib/systemd/system/seed.service
        file_info:
          mode: 0o644
      - dst: /etc/seed
        type: dir
        file_info:
          mode: 0o750
          owner: seed
          group: seed
      - dst: /var/lib/seed
        type: dir
        file_info:
          mode: 0o750
          owner: seed
          group: seed
      - dst: /var/lib/seed/logs
        type: dir
        file_info:
          mode: 0o750
          owner: seed
          group: seed
      - dst: /var/log/seed
        type: dir
        file_info:
          mode: 0o750
          owner: seed
          group: seed
    scripts:
      preinstall: ./deploy/nfpm/preinstall.sh
      postinstall: ./deploy/nfpm/postinstall.sh
      preremove: ./deploy/nfpm/preremove.sh
      postremove: ./deploy/nfpm/postremove.sh
    # Default install location for the binary (overrides nfpm default of
    # /usr/local/bin). Matches existing .deb/.rpm contract.
    bindir: /usr/bin

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: archives-sbom
    artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.json"

signs:
  # Sign all release artifacts via cosign keyless OIDC. Mirrors release.yml's
  # cosign sign-blob loop. Bundle format preserves Sigstore transparency log
  # entry.
  - cmd: cosign
    signature: "${artifact}.cosign.bundle"
    args:
      - sign-blob
      - "--yes"
      - "--bundle"
      - "${artifact}.cosign.bundle"
      - "${artifact}"
    artifacts: all
    output: true

# Homebrew tap publishing previously lived here. Removed 2026-05-18
# because the HOMEBREW_TAP_TOKEN repo secret is unset / lacks scope on
# krisarmstrong/homebrew-tap, which made every release error out
# at the brew step with 403, blocking the downstream SLSA attestation
# job (needs: [goreleaser]). Restore by re-adding the brews: block
# once the PAT is provisioned — see git history of this file.

release:
  github:
    owner: krisarmstrong
    name: seed
  # Use release-please's CHANGELOG.md section as the release body. The
  # `replace_existing_artifacts: true` lets a re-run overwrite a partial
  # earlier failure cleanly.
  replace_existing_artifacts: true
  draft: false
  prerelease: auto
  mode: replace
  header: |
    The Seed {{ .Tag }} — Network Diagnostic Tool by Mustard Seed Networks.

    See [CHANGELOG.md](https://github.com/krisarmstrong/seed/blob/main/CHANGELOG.md)
    for the full release notes.

snapshot:
  version_template: "0.0.0-dryrun-{{ .ShortCommit }}"
