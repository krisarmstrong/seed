<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Outer ring representing network scope -->
  <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="2" opacity="0.3"/>
  <circle cx="24" cy="24" r="14" stroke="currentColor" stroke-width="2" opacity="0.5"/>

  <!-- Center node -->
  <circle cx="24" cy="24" r="4" fill="currentColor"/>

  <!-- Connection lines radiating outward -->
  <line x1="24" y1="10" x2="24" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="30" x2="24" y2="38" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="24" x2="18" y2="24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="24" x2="38" y2="24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  <!-- Diagonal connection lines -->
  <line x1="14.1" y1="14.1" x2="19.1" y2="19.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="28.9" y1="28.9" x2="33.9" y2="33.9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="33.9" y1="14.1" x2="28.9" y2="19.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="14.1" y1="33.9" x2="19.1" y2="28.9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  <!-- Endpoint nodes -->
  <circle cx="24" cy="8" r="3" fill="currentColor"/>
  <circle cx="24" cy="40" r="3" fill="currentColor"/>
  <circle cx="8" cy="24" r="3" fill="currentColor"/>
  <circle cx="40" cy="24" r="3" fill="currentColor"/>
  <circle cx="12.3" cy="12.3" r="2.5" fill="currentColor"/>
  <circle cx="35.7" cy="35.7" r="2.5" fill="currentColor"/>
  <circle cx="35.7" cy="12.3" r="2.5" fill="currentColor"/>
  <circle cx="12.3" cy="35.7" r="2.5" fill="currentColor"/>
</svg>
