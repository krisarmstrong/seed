# Network Interface Chipset Database
#
# This file contains curated metadata for network interface chipsets used for
# automatic detection and friendly naming. Edit this file to add new chipsets
# or update quality ratings.
#
# Fields:
#   vendor:     Manufacturer name (Intel, Broadcom, Realtek, etc.)
#   model:      Chipset model number
#   speed:      Max speed category (1G, 2.5G, 5G, 10G, 25G, 40G, 100G, WiFi5, WiFi6, etc.)
#   quality:    Quality rating 1-100 (driver stability, features, community support)
#   has_tdr:    Supports Time Domain Reflectometry for cable testing
#   has_dom:    Supports Digital Optical Monitoring (SFP+/QSFP)
#   oui_prefix: MAC address OUI prefixes (first 3 octets, colon-separated)
#   pci_vendor: PCI Vendor ID (hex, without 0x prefix)
#   pci_device: PCI Device IDs (hex, without 0x prefix)
#   keywords:   Keywords found in driver/device names for identification

