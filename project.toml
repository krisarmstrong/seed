# Pack (Cloud Native Buildpacks) Configuration
# Build: pack build seed:latest --builder paketobuildpacks/builder-jammy-base
# Run:   docker run -p 8443:8443 seed:latest

[_]
schema-version = "0.2"

[io.buildpacks]
builder = "paketobuildpacks/builder-jammy-base"

[[io.buildpacks.group]]
id = "paketo-buildpacks/go"

[[io.buildpacks.group]]
id = "paketo-buildpacks/go-build"

[[io.buildpacks.build.env]]
name = "BP_GO_TARGETS"
value = "./cmd/seed"

[[io.buildpacks.build.env]]
name = "BP_GO_BUILD_LDFLAGS"
value = "-s -w"

[[io.buildpacks.build.env]]
name = "BP_KEEP_FILES"
value = "bin/*"

[io.buildpacks.run]
user-id = 1000

[[io.buildpacks.run.env]]
name = "SEED_HTTP_PORT"
value = "8443"
